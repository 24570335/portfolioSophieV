<!-- resume -->
{% assign resumedata = site.data.sitetext[site.locale].resume | default: site.data.sitetext.resume %}
<section class="page-section bg-light" id="{{ resumedata.section | default: 'resume' }}">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase" style="margin-bottom: 0.75rem;">
          {{ resumedata.title | default: "Resume & CV" }}
        </h2>
        <p class="text-muted" style="margin-bottom: 2.5rem;">
          {{ resumedata.text | default: "" }}
        </p>
      </div>
    </div>
<!-- Toggle buttons -->
<div class="row justify-content-center mb-4">
  <div class="col-auto">
    <div style="display: inline-flex; border: 2px solid #fed136; border-radius: 6px; overflow: hidden;">
      <button
        id="btn-cv"
        onclick="showDoc('cv')"
        style="padding: 0.6rem 2rem; background: #fed136; border: none; font-weight: 600; cursor: pointer; font-size: 0.95rem;">
        CV
      </button>
      <button
        id="btn-resume"
        onclick="showDoc('resume')"
        style="padding: 0.6rem 2rem; background: transparent; border: none; font-weight: 600; cursor: pointer; font-size: 0.95rem;">
        Resume
      </button>
    </div>
  </div>
</div>

<!-- PDF viewers -->
<div class="row justify-content-center">
  <div class="col-12 col-lg-10">

    <div id="doc-cv">
      <iframe
        src="https://drive.google.com/file/d/1Yqx7za2sDrLQ9l0VhxwLEY0QyUMjPHwH/preview"
        style="width:100%; height:80vh; border: 1px solid #dee2e6; border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);">
      </iframe>
      <div class="text-center mt-3">
        <a href="{{ site.baseurl }}/assets/docs/CV.pdf" download class="btn btn-primary btn-xl">
          Download CV
        </a>
      </div>
    </div>

    <div id="doc-resume" style="display:none;">
      <iframe
        src="https://drive.google.com/file/d/1pVuCzMZP3HXt-3M6XZ-AQOhwDY_p7VER/preview"
        style="width:100%; height:80vh; border: 1px solid #dee2e6; border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);">
      </iframe>
      <div class="text-center mt-3">
        <a href="{{ site.baseurl }}/assets/docs/resume.pdf" download class="btn btn-primary btn-xl">
          Download Resume
        </a>
      </div>
    </div>

  </div>
</div>
</section>

<script>
function showDoc(type) {
  document.getElementById('doc-resume').style.display = type === 'resume' ? 'block' : 'none';
  document.getElementById('doc-cv').style.display     = type === 'cv'     ? 'block' : 'none';
  document.getElementById('btn-resume').style.background = type === 'resume' ? '#fed136' : 'transparent';
  document.getElementById('btn-cv').style.background     = type === 'cv'     ? '#fed136' : 'transparent';
}
</script>
<!-- End resume -->
